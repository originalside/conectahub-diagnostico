<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin — Diagnóstico ConectaHub</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--amber:#F5A623;--black:#111;--gray:#1a1a1a}
body{font-family:'Segoe UI',sans-serif;background:#0d0d0d;color:#e8e8e8;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a1a,#222);border-bottom:2px solid var(--amber);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.logo{height:36px}
.header-title h1{font-size:16px;color:#fff;font-weight:600}
.header-title p{font-size:12px;color:#888}
.container{max-width:1200px;margin:0 auto;padding:32px 20px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:20px;text-align:center}
.stat-card.highlight{border-color:var(--amber)}
.stat-num{font-size:32px;font-weight:800;color:var(--amber)}
.stat-label{font-size:12px;color:#888;margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.section-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #2a2a2a}
.table-wrap{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;overflow:hidden;margin-bottom:32px}
table{width:100%;border-collapse:collapse}
th{background:#111;padding:12px 16px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;font-weight:600}
td{padding:14px 16px;border-top:1px solid #222;font-size:14px}
tr:hover td{background:#1f1f1f}
.score{font-weight:700;color:var(--amber)}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.badge.lider{background:#22c55e20;color:#22c55e;border:1px solid #22c55e40}
.badge.evolucao{background:#F5A62320;color:#F5A623;border:1px solid #F5A62340}
.badge.fragilizada{background:#ef444420;color:#ef4444;border:1px solid #ef444440}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px}
.chart-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:24px}
.chart-card h3{font-size:14px;color:#ccc;margin-bottom:16px;font-weight:600}
.loading{text-align:center;padding:60px;color:#666}
.error{background:#2a1a1a;border:1px solid #5a2a2a;border-radius:12px;padding:24px;color:#ef4444;text-align:center;margin-bottom:24px}
.refresh-btn{background:var(--amber);color:#000;border:none;padding:10px 24px;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px}
.refresh-btn:hover{opacity:.85}
.empty{text-align:center;padding:40px;color:#555}
@media(max-width:768px){.stats-grid{grid-template-columns:repeat(2,1fr)}.chart-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:16px">
    <img class="logo" src="https://conectahub.com.au/wp-content/uploads/2025/05/Conecta-Hub-Logo.svg" alt="ConectaHub">
    <div class="header-title">
      <h1>Painel Admin — Diagnóstico</h1>
      <p>Visão geral de todos os membros</p>
    </div>
  </div>
  <button class="refresh-btn" onclick="loadData()">↻ Atualizar</button>
</div>

<div class="container">
  <div id="loading" class="loading">Carregando dados...</div>
  <div id="error" class="error" style="display:none"></div>
  <div id="content" style="display:none">
    <div class="stats-grid">
      <div class="stat-card highlight">
        <div class="stat-num" id="s-total">0</div>
        <div class="stat-label">Total de Membros</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="s-geral">—</div>
        <div class="stat-label">Média Geral do Grupo</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="s-top">—</div>
        <div class="stat-label">Maior Pontuação</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="s-low">—</div>
        <div class="stat-label">Menor Pontuação</div>
      </div>
    </div>

    <div class="chart-grid">
      <div class="chart-card">
        <h3>Distribuição por Classificação</h3>
        <canvas id="classifChart" height="200"></canvas>
      </div>
      <div class="chart-card">
        <h3>Médias por Bloco (Grupo)</h3>
        <canvas id="blockChart" height="200"></canvas>
      </div>
    </div>

    <div class="section-title">Todos os Membros</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Nome</th>
            <th>Empresa</th>
            <th>Líder</th>
            <th>Time</th>
            <th>Estrutura</th>
            <th>Geral</th>
            <th>Classificação</th>
          </tr>
        </thead>
        <tbody id="members-table"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const WEBHOOK = 'https://script.google.com/macros/s/AKfycbx_2QBhN2b__HgzepzBe3WEbIhEZLWH_zNQ6sFsGVhxHu1xWgSTZwf-a6SHCrxMH4H_/exec';

function badgeCls(c) {
  if (!c) return 'evolucao';
  if (c.includes('Alto')) return 'lider';
  if (c.includes('Fragilizada')) return 'fragilizada';
  return 'evolucao';
}

function avg(arr) {
  const nums = arr.filter(n => n !== '' && n !== null && !isNaN(+n)).map(Number);
  if (!nums.length) return 0;
  return +(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1);
}

let radarChart, blockChart;

async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  document.getElementById('error').style.display = 'none';

  try {
    const res = await fetch(WEBHOOK + '?t=' + Date.now());
    const data = await res.json();
    
    if (data.error) throw new Error(data.error);
    
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    if (!data.length) {
      document.getElementById('members-table').innerHTML = '<tr><td colspan="8" class="empty">Nenhum diagnóstico recebido ainda.</td></tr>';
      return;
    }

    // Stats
    const gerais = data.map(r => +r['Geral']).filter(n => !isNaN(n) && n > 0);
    document.getElementById('s-total').textContent = data.length;
    document.getElementById('s-geral').textContent = gerais.length ? avg(gerais) : '—';
    document.getElementById('s-top').textContent = gerais.length ? Math.max(...gerais) : '—';
    document.getElementById('s-low').textContent = gerais.length ? Math.min(...gerais) : '—';

    // Table
    const tbody = document.getElementById('members-table');
    tbody.innerHTML = data.map(r => {
      const bc = badgeCls(r['Classificação']);
      return `<tr>
        <td style="color:#666;font-size:12px">${r['Data'] || ''}</td>
        <td style="font-weight:600;color:#fff">${r['Nome'] || ''}</td>
        <td style="color:#aaa">${r['Empresa'] || ''}</td>
        <td class="score">${r['Líder'] || '—'}</td>
        <td class="score">${r['Time'] || '—'}</td>
        <td class="score">${r['Estrutura'] || '—'}</td>
        <td class="score" style="font-size:18px">${r['Geral'] || '—'}</td>
        <td><span class="badge ${bc}">${r['Classificação'] || '—'}</span></td>
      </tr>`;
    }).join('');

    // Charts
    const classifCounts = {lider:0, evolucao:0, fragilizada:0};
    data.forEach(r => {
      const c = r['Classificação'] || '';
      if (c.includes('Alto')) classifCounts.lider++;
      else if (c.includes('Fragilizada')) classifCounts.fragilizada++;
      else classifCounts.evolucao++;
    });

    if (radarChart) radarChart.destroy();
    radarChart = new Chart(document.getElementById('classifChart').getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: ['Líder de Alto Impacto', 'Em Evolução', 'Estrutura Fragilizada'],
        datasets: [{
          data: [classifCounts.lider, classifCounts.evolucao, classifCounts.fragilizada],
          backgroundColor: ['#22c55e', '#F5A623', '#ef4444'],
          borderWidth: 0
        }]
      },
      options: {
        responsive: true,
        plugins: {legend: {labels: {color: '#ccc', font: {size: 12}}}}
      }
    });

    const avgLider = avg(data.map(r => r['Líder']));
    const avgTime = avg(data.map(r => r['Time']));
    const avgEst = avg(data.map(r => r['Estrutura']));

    if (blockChart) blockChart.destroy();
    blockChart = new Chart(document.getElementById('blockChart').getContext('2d'), {
      type: 'bar',
      data: {
        labels: ['Líder', 'Time', 'Estrutura'],
        datasets: [{
          data: [avgLider, avgTime, avgEst],
          backgroundColor: ['#F5A623cc', '#F5A623aa', '#F5A62388'],
          borderColor: '#F5A623',
          borderWidth: 1,
          borderRadius: 6
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: {min: 0, max: 10, ticks: {color: '#666'}, grid: {color: '#2a2a2a'}},
          x: {ticks: {color: '#ccc'}, grid: {display: false}}
        },
        plugins: {legend: {display: false}}
      }
    });

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Erro ao carregar dados: ' + e.message;
  }
}

loadData();
</script>
</body>
</html>
